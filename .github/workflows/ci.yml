name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  release:
    name: Release Binaries
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - runner: windows-latest
            goos: windows
            goarch: amd64
            archive_ext: zip

    env:
      APP_NAME: kafka-json-loader

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          binary_name="${APP_NAME}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            binary_name="${binary_name}.exe"
          fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o "dist/${binary_name}" ./cmd/kafka-json-loader

      - name: Package tar.gz archive
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          archive_name="${APP_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          tar -C dist -czf "dist/${archive_name}" .

      - name: Package zip archive
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $archiveName = "${env:APP_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}.zip"
          Compress-Archive -Path dist\* -DestinationPath "dist\$archiveName"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.${{ matrix.archive_ext }}
